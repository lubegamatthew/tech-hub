<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Order System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cavendish Tech Hub</h1>
            <p>Welcome to our online store</p>
        </header>

        <main>
            <!-- Products Section -->
            <section class="products-section">
                <h2>Available Products</h2>
                <div id="products-container" class="products-grid">
                    <!-- Products will be loaded here by JavaScript -->
                </div>
            </section>

            <!-- Cart Section -->
            <section class="cart-section">
                <h2>Your Cart</h2>
                <div id="cart-container" class="cart-container">
                    <p id="empty-cart-message">Your cart is empty</p>
                    <div id="cart-items" class="cart-items"></div>
                    <div id="cart-summary" class="cart-summary hidden">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (10%):</span>
                            <span id="tax">$0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="total">$0.00</span>
                        </div>
                        <button type="button" id="checkout-btn" class="checkout-btn">Place Order</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Order Form Modal -->
        <div id="order-form-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Complete Your Order</h2>
                <form id="order-form" method="POST" action="process_order.php">
                    <div class="form-group" id="name-group">
                        <label for="customer-name">Full Name *</label>
                        <input type="text" id="customer-name" name="name" >
                        <span class="error-message" id="name-error"></span>
                    </div>
                    <div class="form-group" id="phone-group">
                        <label for="customer-phone">Phone Number *</label>
                        <input type="tel" id="customer-phone" name="phone" >
                        <span class="error-message" id="phone-error"></span>
                    </div>
                    <div class="form-group" id="email-group">
                        <label for="customer-email">Email Address *</label>
                        <input type="email" id="customer-email" name="email" >
                        <span class="error-message" id="email-error"></span>
                    </div>
                    <div class="form-group" id="location-group">
                        <label for="customer-location">Delivery Location *</label>
                        <textarea id="customer-location" name="location" rows="3" ></textarea>
                        <span class="error-message" id="location-error"></span>
                    </div>
                    <input type="hidden" id="order-id-field" name="order_id">
                    <input type="hidden" id="order-total-field" name="total">
                    <div class="form-actions">
                        <button type="button" id="cancel-form-btn" class="cancel-btn">Cancel</button>
                        <button type="submit" class="submit-btn">Place Order</button>
                    </div>
                </form>
                <div id="form-success-message" class="hidden">
                    <h2>Order Confirmed!</h2>
                    <p>Thank you for your order.</p>
                    <p>Order ID: <span id="final-order-id"></span></p>
                    <p>Total: <span id="final-order-total"></span></p>
                    <button type="button" id="close-success-btn" class="close-modal-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
