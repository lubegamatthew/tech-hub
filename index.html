<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Order System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cavendish Tech Hub</h1>
            <p>Welcome to our online store</p>
        </header>

        <main>
            <!-- Products Section -->
            <section class="products-section">
                <h2>Available Products</h2>
                <div id="products-container" class="products-grid">
                    <!-- Products will be loaded here by JavaScript -->
                </div>
            </section>

            <!-- Cart Section -->
            <section class="cart-section">
                <h2>Your Cart</h2>
                <div id="cart-container" class="cart-container">
                    <p id="empty-cart-message">Your cart is empty</p>
                    <div id="cart-items" class="cart-items"></div>
                    <div id="cart-summary" class="cart-summary hidden">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (10%):</span>
                            <span id="tax">$0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="total">$0.00</span>
                        </div>
                        <button id="checkout-btn" class="checkout-btn">Place Order</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Order Confirmation Modal -->
        <div id="order-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Order Confirmed!</h2>
                <p>Thank you for your order.</p>
                <p>Order ID: <span id="order-id"></span></p>
                <p>Total: <span id="order-total"></span></p>
                <button id="close-modal-btn" class="close-modal-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
